services:
  postgres:
    image: postgres:16-alpine
    container_name: mekteb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mekteb
      POSTGRES_PASSWORD: mekteb
      POSTGRES_DB: mekteb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
