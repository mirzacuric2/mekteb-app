services:
  - type: web
    name: mekteb-api
    env: docker
    dockerfilePath: Dockerfile.server
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: web
    name: mekteb-web
    env: docker
    dockerfilePath: Dockerfile.web
    plan: starter
    envVars:
      - key: VITE_API_URL
        sync: false
